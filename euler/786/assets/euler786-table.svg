<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="580" viewBox="0 0 1100 580" role="img" aria-labelledby="title desc">
<title id="title">Форма стола и скрытый правильный шестиугольник</title>
<desc id="desc">Слева исходный четырёхугольник с углами. Справа шесть его отражённых копий составляют правильный шестиугольник.</desc>
