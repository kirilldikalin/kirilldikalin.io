<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">Карта методов решения Too Many Twos</title>
<desc id="desc">Две главные ветви: конечное тождество и 2-адический хвост; они сходятся в точном подсчёте U(N).</desc>

<style>
  :root { --bg:#fbfbfd; --fg:#171821; --muted:#626779; --grid:#d9dce6;
          --a:#2b6de0; --b:#db5a42; --c:#6e57c5; --soft:#eef3ff; }
  .bg { fill:var(--bg); }
  .fg { fill:var(--fg); }
  .muted { fill:var(--muted); }
  .grid { stroke:var(--grid); stroke-width:1; }
  .axis { stroke:var(--fg); stroke-width:1.5; }
  .line-a { fill:none; stroke:var(--a); stroke-width:4; stroke-linejoin:round; stroke-linecap:round; }
  .line-b { fill:none; stroke:var(--b); stroke-width:4; stroke-linejoin:round; stroke-linecap:round; }
  .mark-a { fill:var(--a); }
  .mark-b { fill:var(--b); }
  .mark-c { fill:var(--c); }
  .soft { fill:var(--soft); }
  text { font-family:"Courier Prime","Courier New",monospace; }
  .title { font-size:28px; font-weight:600; }
  .subtitle { font-size:18px; font-weight:500; }
  .label { font-size:16px; }
  .small { font-size:14px; }
  .mono { font-family:"Courier Prime","Courier New",monospace; }
</style>

<rect class="bg" width="1200" height="720"/>
<text x="60" y="690" class="muted small">Сплошная линия — рекомендуемый путь; пунктир — полезные альтернативы.</text>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--muted)"/></marker></defs>
<path d="M600,123 C600,164 305,164 305,205" fill="none" stroke="var(--muted)" stroke-width="2.5" marker-end="url(#arrow)"/>
<path d="M600,123 C600,164 895,164 895,205" fill="none" stroke="var(--muted)" stroke-width="2.5" marker-end="url(#arrow)"/>
<path d="M305,305 C305,355 195,355 195,405" fill="none" stroke="var(--muted)" stroke-width="2.5" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
<path d="M305,305 C305,355 535,355 535,405" fill="none" stroke="var(--muted)" stroke-width="2.5" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
<path d="M895,305 C895,355 940,355 940,405" fill="none" stroke="var(--muted)" stroke-width="2.5" marker-end="url(#arrow)"/>
<path d="M195,515 C195,552 470,552 470,590" fill="none" stroke="var(--muted)" stroke-width="2.5" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
<path d="M535,515 C535,552 570,552 570,590" fill="none" stroke="var(--muted)" stroke-width="2.5" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
<path d="M940,515 C940,552 730,552 730,590" fill="none" stroke="var(--muted)" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="420" y="45" width="360" height="78" rx="15" class="soft" stroke="var(--grid)"/>
<text x="600.0" y="79" text-anchor="middle" class="fg subtitle">Исходная сумма S(n)</text>
<text x="600.0" y="107" text-anchor="middle" class="muted small">нужна только ν₂(3S(n)+4)</text>
<rect x="95" y="205" width="420" height="100" rx="15" class="soft" stroke="var(--grid)"/>
<text x="305.0" y="239" text-anchor="middle" class="fg subtitle">Конечное тождество</text>
<text x="305.0" y="267" text-anchor="middle" class="muted small">3S(n)+4 = (−2)ⁿ⁺² aₙ</text>
<rect x="685" y="205" width="420" height="100" rx="15" class="soft" stroke="var(--grid)"/>
<text x="895.0" y="239" text-anchor="middle" class="fg subtitle">2-адический предел</text>
<text x="895.0" y="267" text-anchor="middle" class="muted small">бесконечная сумма равна −4/3</text>
<rect x="45" y="405" width="300" height="110" rx="15" class="soft" stroke="var(--grid)"/>
<text x="195.0" y="439" text-anchor="middle" class="fg subtitle">A026641</text>
<text x="195.0" y="467" text-anchor="middle" class="muted small">рекуррентность и производящая функция</text>
<rect x="385" y="405" width="300" height="110" rx="15" class="soft" stroke="var(--grid)"/>
<text x="535.0" y="439" text-anchor="middle" class="fg subtitle">Биномиалы mod 2ʳ</text>
<text x="535.0" y="467" text-anchor="middle" class="muted small">Kummer + нечётные факториалы</text>
<rect x="725" y="405" width="430" height="110" rx="15" class="soft" stroke="var(--grid)"/>
<text x="940.0" y="439" text-anchor="middle" class="fg subtitle">Короткий хвост</text>
<text x="940.0" y="467" text-anchor="middle" class="muted small">отношения соседних членов; без больших C(2k,k)</text>
<rect x="365" y="590" width="470" height="82" rx="15" class="soft" stroke="var(--grid)"/>
<text x="600.0" y="624" text-anchor="middle" class="fg subtitle">Точная сумма U(N)</text>
<text x="600.0" y="652" text-anchor="middle" class="muted small">адаптивная точность и проверка стабилизации</text>
</svg>
