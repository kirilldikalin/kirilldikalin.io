<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 590" role="img" aria-labelledby="title desc">
<title id="title">Накопленная ошибка popcount-приближения</title>
<desc id="desc">График колеблется между -12 и 20 и заканчивается значением -1 при M=10000.</desc>

<style>
  :root { --bg:#fbfbfd; --fg:#171821; --muted:#626779; --grid:#d9dce6;
